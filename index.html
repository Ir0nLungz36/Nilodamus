<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expansion + Relative Strength Portal</title>

<style>
body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}
h1{
    text-align:center;
}
.container{
    max-width:1500px;
    margin:auto;
}
.panel{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}
input, textarea, select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    margin-bottom:10px;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    width:100%;
    font-weight:bold;
}
button:hover{
    background:#1d4ed8;
}
table{
    width:100%;
    border-collapse:collapse;
    font-size:14px;
}
th{
    background:#0f172a;
    color:white;
}
th,td{
    padding:9px;
    border-bottom:1px solid #334155;
    text-align:center;
}
.s{
    color:#22c55e;
    font-weight:bold;
}
.a{
    color:#38bdf8;
    font-weight:bold;
}
.b{
    color:#facc15;
    font-weight:bold;
}
.c{
    color:#ef4444;
    font-weight:bold;
}
.leader{
    color:#22c55e;
    font-weight:bold;
}
.strong{
    color:#38bdf8;
    font-weight:bold;
}
.weak{
    color:#facc15;
    font-weight:bold;
}
.laggard{
    color:#ef4444;
    font-weight:bold;
}
.log{
    font-size:12px;
    white-space:pre-wrap;
}
.small{
    color:#94a3b8;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h1>ADR Expansion + Relative Strength Portal</h1>

<div class="panel">

<label>Massive API Key</label>
<input type="password" id="apiKey" placeholder="Paste Massive API Key">

<label>Benchmark</label>
<select id="benchmark">
    <option value="QQQ" selected>QQQ - Growth / Tech Benchmark</option>
    <option value="SPY">SPY - Broad Market Benchmark</option>
    <option value="IWM">IWM - Small Cap Benchmark</option>
</select>

<label>Symbols</label>
<textarea id="symbols" rows="6">
NVDA,
OPEN,
SOFI,
PLTR,
BAC,
SMCI
</textarea>

<button onclick="runScan()">RUN SCAN</button>

<p class="small">
Use QQQ for NVDA / PLTR / SOFI / OPEN / SMCI. Use SPY for broad market. Use IWM for small caps.
</p>

</div>

<div class="panel">
<div id="results">Waiting for scan...</div>
</div>

<div class="panel">
<div id="log" class="log"></div>
</div>

</div>

<script>

function writeLog(text){
    document.getElementById("log").innerHTML += text + "\\n";
}

function fmt(num, decimals=2){
    if(num === null || num === undefined || isNaN(num)){
        return "-";
    }
    return Number(num).toFixed(decimals);
}

async function getBars(symbol){

    const apiKey = document.getElementById("apiKey").value.trim();

    if(!apiKey){
        throw new Error("Missing API key");
    }

    const end = new Date().toISOString().split("T")[0];

    const startDate = new Date();
    startDate.setDate(startDate.getDate() - 75);

    const start = startDate.toISOString().split("T")[0];

    const url =
`https://api.massive.com/v2/aggs/ticker/${symbol}/range/1/day/${start}/${end}?adjusted=true&sort=asc&limit=120&apikey=${apiKey}`;

    const response = await fetch(url);

    if(!response.ok){
        throw new Error("HTTP " + response.status);
    }

    const data = await response.json();

    if(!data.results || data.results.length < 2){
        throw new Error("Not enough bar data");
    }

    return data.results;
}

function completedBarsOnly(bars){

    /*
      Massive daily aggregates may include today's still-forming bar.
      That is useful for intraday expansion.
      We keep it, but separate previous bars for ADR calculation.
    */

    return bars;
}

function calcADR20(bars){

    /*
      Use the 20 bars BEFORE the latest bar.
      This prevents today's current range from contaminating ADR20.
    */

    const priorBars = bars.slice(-21, -1);

    if(priorBars.length < 20){
        return null;
    }

    let total = 0;

    priorBars.forEach(bar=>{
        total += (bar.h - bar.l);
    });

    return total / priorBars.length;
}

function calcAvgVol20(bars){

    /*
      Uses the 20 bars BEFORE the latest bar.
      Keeps today's live/incomplete volume out of the average.
    */

    const priorBars = bars.slice(-21, -1);

    if(priorBars.length < 20){
        return null;
    }

    let total = 0;

    priorBars.forEach(bar=>{
        total += bar.v;
    });

    return total / priorBars.length;
}

function rsLabel(rs){

    if(rs > 2){
        return "LEADER";
    }

    if(rs > 0){
        return "STRONG";
    }

    if(rs > -2){
        return "WEAK";
    }

    return "LAGGARD";
}

function getGrade(expansion, rs, volume){

    if(
        expansion >= 120 &&
        rs >= 2 &&
        volume >= 1.5
    ){
        return "S";
    }

    if(
        expansion >= 100 &&
        rs >= 1 &&
        volume >= 1.2
    ){
        return "A";
    }

    if(
        expansion >= 80 &&
        rs >= 0
    ){
        return "B";
    }

    return "C";
}

function render(rows, benchmark){

    let html = `

<table>

<tr>
<th>Symbol</th>
<th>Price</th>
<th>High</th>
<th>Low</th>
<th>Range</th>
<th>ADR20</th>
<th>Expansion%</th>
<th>Stock Ret%</th>
<th>${benchmark} Ret%</th>
<th>RS</th>
<th>RS Label</th>
<th>Vol Factor</th>
<th>Grade</th>
</tr>

`;

    rows.forEach(r=>{

        const labelClass = r.label.toLowerCase();

        html += `

<tr>
<td>${r.symbol}</td>
<td>$${r.price}</td>
<td>$${r.high}</td>
<td>$${r.low}</td>
<td>${r.range}</td>
<td>${r.adr}</td>
<td>${r.expansion}%</td>
<td>${r.stockReturn}%</td>
<td>${r.benchmarkReturn}%</td>
<td>${r.rs}%</td>
<td class="${labelClass}">${r.label}</td>
<td>${r.volume}x</td>
<td class="${r.grade.toLowerCase()}">${r.grade}</td>
</tr>

`;

    });

    html += "</table>";

    document.getElementById("results").innerHTML = html;
}

async function runScan(){

    document.getElementById("log").innerHTML = "";
    document.getElementById("results").innerHTML = "Running scan...";

    const benchmark = document.getElementById("benchmark").value.trim().toUpperCase();

    writeLog("Loading benchmark: " + benchmark);

    let benchmarkBars;

    try{
        benchmarkBars = await getBars(benchmark);
    }
    catch(err){
        writeLog(benchmark + " ERROR -> " + err.message);
        document.getElementById("results").innerHTML = "Benchmark failed. Check API key or endpoint access.";
        return;
    }

    const benchmarkLatest = benchmarkBars[benchmarkBars.length - 1];
    const benchmarkPrev = benchmarkBars[benchmarkBars.length - 2];

    const benchmarkReturn =
        ((benchmarkLatest.c - benchmarkPrev.c) / benchmarkPrev.c) * 100;

    writeLog(
        benchmark +
        " return used for RS: " +
        benchmarkReturn.toFixed(2) +
        "%"
    );

    const symbols = document
        .getElementById("symbols")
        .value
        .split(",")
        .map(x=>x.trim().toUpperCase())
        .filter(Boolean)
        .filter(x=>x !== benchmark);

    let results = [];

    for(const symbol of symbols){

        try{

            writeLog("Scanning " + symbol);

            const bars = await getBars(symbol);

            if(bars.length < 21){
                writeLog(symbol + " skipped: less than 21 bars");
                continue;
            }

            const latest = bars[bars.length - 1];
            const prev = bars[bars.length - 2];

            const adr = calcADR20(bars);
            const avgVol = calcAvgVol20(bars);

            const range = latest.h - latest.l;

            const expansion = (range / adr) * 100;

            const stockReturn =
                ((latest.c - prev.c) / prev.c) * 100;

            const rs = stockReturn - benchmarkReturn;

            const volumeFactor = latest.v / avgVol;

            const label = rsLabel(rs);

            const grade = getGrade(
                expansion,
                rs,
                volumeFactor
            );

            results.push({

                symbol,

                price: fmt(latest.c,2),

                high: fmt(latest.h,2),

                low: fmt(latest.l,2),

                range: fmt(range,2),

                adr: fmt(adr,2),

                expansion: fmt(expansion,1),

                stockReturn: fmt(stockReturn,2),

                benchmarkReturn: fmt(benchmarkReturn,2),

                rs: fmt(rs,2),

                label,

                volume: fmt(volumeFactor,2),

                grade

            });

            writeLog(
                symbol +
                " | Ret: " +
                stockReturn.toFixed(2) +
                "% | RS: " +
                rs.toFixed(2) +
                "% | Expansion: " +
                expansion.toFixed(1) +
                "%"
            );

        }

        catch(err){

            writeLog(symbol + " ERROR -> " + err.message);

        }

    }

    results.sort((a,b)=>{

        const gradeRank = {
            S:4,
            A:3,
            B:2,
            C:1
        };

        const g =
            gradeRank[b.grade] -
            gradeRank[a.grade];

        if(g !== 0){
            return g;
        }

        return parseFloat(b.rs) - parseFloat(a.rs);

    });

    render(results, benchmark);

    writeLog("Scan complete.");
}

</script>

</body>
</html>
