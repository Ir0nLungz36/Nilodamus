<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADR Expansion + Relative Strength Portal</title>

<style>
body{background:#0f172a;color:#e2e8f0;font-family:Arial,sans-serif;margin:0;padding:20px}
.container{max-width:1550px;margin:auto}
h1{text-align:center}
.panel{background:#1e293b;border-radius:12px;padding:15px;margin-bottom:15px}
input,textarea,select{width:100%;padding:10px;border-radius:8px;border:none;margin:6px 0 12px}
button{background:#2563eb;color:#fff;border:none;padding:12px;border-radius:8px;width:100%;font-weight:bold;cursor:pointer}
button:hover{background:#1d4ed8}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#0f172a}
th,td{padding:9px;border-bottom:1px solid #334155;text-align:center}
.s,.leader,.bull{color:#22c55e;font-weight:bold}
.a,.strong{color:#38bdf8;font-weight:bold}
.b,.weak,.neutral{color:#facc15;font-weight:bold}
.c,.laggard,.bear,.trap{color:#ef4444;font-weight:bold}
.log{font-size:12px;white-space:pre-wrap;color:#cbd5e1}
.small{font-size:13px;color:#94a3b8}
</style>
</head>

<body>

<div class="container">

<h1>ADR Expansion + Relative Strength Portal</h1>

<div class="panel">
<label>Massive API Key</label>
<input type="password" id="apiKey" placeholder="Paste Massive API Key">

<label>Benchmark</label>
<select id="benchmark">
<option value="QQQ" selected>QQQ - Growth / Tech</option>
<option value="SPY">SPY - Broad Market</option>
<option value="IWM">IWM - Small Caps</option>
</select>

<label>Request Delay</label>
<select id="delay">
<option value="800" selected>Normal - 0.8 sec</option>
<option value="1500">Safer - 1.5 sec</option>
<option value="2500">Very Safe - 2.5 sec</option>
</select>

<label>Symbols</label>
<textarea id="symbols" rows="6">
NVDA,
OPEN,
SOFI,
PLTR,
BAC,
SMCI
</textarea>

<button onclick="runScan()">RUN SCAN</button>

<p class="small">
Bias logic: bullish only when expansion + positive RS + close near high. Bearish when expansion + negative RS + close near low.
</p>
</div>

<div class="panel">
<div id="results">Waiting for scan...</div>
</div>

<div class="panel">
<div id="log" class="log"></div>
</div>

</div>

<script>

const cache = {};

function sleep(ms){
    return new Promise(resolve=>setTimeout(resolve,ms));
}

function log(msg){
    document.getElementById("log").innerHTML += msg + "\\n";
}

function fmt(n,d=2){
    if(n===null || n===undefined || isNaN(n)) return "-";
    return Number(n).toFixed(d);
}

function getDateDaysAgo(days){
    const d = new Date();
    d.setDate(d.getDate()-days);
    return d.toISOString().split("T")[0];
}

async function fetchWithRetry(url, symbol, retries=3){

    for(let attempt=1; attempt<=retries; attempt++){

        const res = await fetch(url);

        if(res.status === 429){
            const wait = attempt * 2500;
            log(symbol + " 429 rate limit. Waiting " + wait/1000 + " sec...");
            await sleep(wait);
            continue;
        }

        if(!res.ok){
            throw new Error("HTTP " + res.status);
        }

        return await res.json();
    }

    throw new Error("429 rate limit after retries");
}

async function getBars(symbol){

    symbol = symbol.toUpperCase();

    if(cache[symbol]){
        return cache[symbol];
    }

    const apiKey = document.getElementById("apiKey").value.trim();

    if(!apiKey){
        throw new Error("Missing API key");
    }

    const end = getDateDaysAgo(0);
    const start = getDateDaysAgo(90);

    const url =
`https://api.massive.com/v2/aggs/ticker/${symbol}/range/1/day/${start}/${end}?adjusted=true&sort=asc&limit=120&apiKey=${apiKey}`;

    const data = await fetchWithRetry(url, symbol);

    if(!data.results || data.results.length < 21){
        throw new Error("Not enough daily bars");
    }

    cache[symbol] = data.results;
    return data.results;
}

function adr20(bars){
    const prior = bars.slice(-21,-1);
    let total = 0;
    prior.forEach(b=>total += b.h-b.l);
    return total / prior.length;
}

function avgVol20(bars){
    const prior = bars.slice(-21,-1);
    let total = 0;
    prior.forEach(b=>total += b.v);
    return total / prior.length;
}

function rsLabel(rs){
    if(rs > 2) return "LEADER";
    if(rs > 0) return "STRONG";
    if(rs > -2) return "WEAK";
    return "LAGGARD";
}

function closeLocation(close, high, low){

    const range = high - low;

    if(range <= 0){
        return 50;
    }

    return ((close - low) / range) * 100;
}

function getBias(expansion, rs, closeLoc){

    if(expansion >= 100 && rs > 0 && closeLoc >= 70){
        return {
            text:"BULLISH EXPANSION",
            cls:"bull"
        };
    }

    if(expansion >= 100 && rs < 0 && closeLoc <= 35){
        return {
            text:"BEARISH EXPANSION",
            cls:"bear"
        };
    }

    if(expansion >= 100 && rs < 0){
        return {
            text:"EXPANSION TRAP",
            cls:"trap"
        };
    }

    if(expansion >= 80 && rs > 0){
        return {
            text:"WATCH BULLISH",
            cls:"neutral"
        };
    }

    return {
        text:"NEUTRAL / WAIT",
        cls:"neutral"
    };
}

function grade(expansion, rs, vol, closeLoc){

    if(expansion >= 120 && rs >= 2 && vol >= 1.5 && closeLoc >= 70){
        return "S";
    }

    if(expansion >= 100 && rs >= 1 && vol >= 1.2 && closeLoc >= 60){
        return "A";
    }

    if(expansion >= 80 && rs >= 0){
        return "B";
    }

    return "C";
}

function render(rows, benchmark){

    let html = `
<table>
<tr>
<th>Symbol</th>
<th>Price</th>
<th>High</th>
<th>Low</th>
<th>Range</th>
<th>ADR20</th>
<th>Expansion%</th>
<th>Close Loc%</th>
<th>Stock Ret%</th>
<th>${benchmark} Ret%</th>
<th>RS</th>
<th>RS Label</th>
<th>Bias</th>
<th>Vol Factor</th>
<th>Grade</th>
</tr>`;

    rows.forEach(r=>{
        html += `
<tr>
<td>${r.symbol}</td>
<td>$${r.price}</td>
<td>$${r.high}</td>
<td>$${r.low}</td>
<td>${r.range}</td>
<td>${r.adr}</td>
<td>${r.expansion}%</td>
<td>${r.closeLoc}%</td>
<td>${r.stockReturn}%</td>
<td>${r.benchmarkReturn}%</td>
<td>${r.rs}%</td>
<td class="${r.label.toLowerCase()}">${r.label}</td>
<td class="${r.biasClass}">${r.bias}</td>
<td>${r.volume}x</td>
<td class="${r.grade.toLowerCase()}">${r.grade}</td>
</tr>`;
    });

    html += "</table>";

    document.getElementById("results").innerHTML = html;
}

async function runScan(){

    document.getElementById("log").innerHTML = "";
    document.getElementById("results").innerHTML = "Running scan...";

    const benchmark = document.getElementById("benchmark").value.toUpperCase();
    const delayMs = Number(document.getElementById("delay").value);

    const symbols = document
        .getElementById("symbols")
        .value
        .split(",")
        .map(x=>x.trim().toUpperCase())
        .filter(Boolean)
        .filter(x=>x !== benchmark);

    log("Benchmark: " + benchmark);
    log("Symbols: " + symbols.join(", "));
    log("Delay: " + delayMs + "ms");

    let benchmarkBars;

    try{
        benchmarkBars = await getBars(benchmark);
    }catch(err){
        document.getElementById("results").innerHTML = "Benchmark failed.";
        log(benchmark + " ERROR -> " + err.message);
        return;
    }

    const bLatest = benchmarkBars[benchmarkBars.length-1];
    const bPrev = benchmarkBars[benchmarkBars.length-2];

    const benchmarkReturn =
        ((bLatest.c - bPrev.c) / bPrev.c) * 100;

    log(benchmark + " return: " + benchmarkReturn.toFixed(2) + "%");

    const results = [];

    for(const symbol of symbols){

        try{

            await sleep(delayMs);

            log("Scanning " + symbol + "...");

            const bars = await getBars(symbol);

            const latest = bars[bars.length-1];
            const prev = bars[bars.length-2];

            const adr = adr20(bars);
            const avgVol = avgVol20(bars);
            const range = latest.h - latest.l;

            const expansion = (range / adr) * 100;

            const stockReturn =
                ((latest.c - prev.c) / prev.c) * 100;

            const rs = stockReturn - benchmarkReturn;

            const volFactor = latest.v / avgVol;

            const label = rsLabel(rs);

            const closeLoc = closeLocation(
                latest.c,
                latest.h,
                latest.l
            );

            const biasObj = getBias(
                expansion,
                rs,
                closeLoc
            );

            const finalGrade = grade(
                expansion,
                rs,
                volFactor,
                closeLoc
            );

            results.push({
                symbol,
                price:fmt(latest.c,2),
                high:fmt(latest.h,2),
                low:fmt(latest.l,2),
                range:fmt(range,2),
                adr:fmt(adr,2),
                expansion:fmt(expansion,1),
                closeLoc:fmt(closeLoc,0),
                stockReturn:fmt(stockReturn,2),
                benchmarkReturn:fmt(benchmarkReturn,2),
                rs:fmt(rs,2),
                label,
                bias:biasObj.text,
                biasClass:biasObj.cls,
                volume:fmt(volFactor,2),
                grade:finalGrade
            });

            log(
                symbol +
                " OK | Bias: " +
                biasObj.text +
                " | RS " +
                rs.toFixed(2) +
                "% | Expansion " +
                expansion.toFixed(1) +
                "%"
            );

        }catch(err){
            log(symbol + " ERROR -> " + err.message);
        }
    }

    results.sort((a,b)=>{
        const rank = {S:4,A:3,B:2,C:1};
        const g = rank[b.grade] - rank[a.grade];
        if(g !== 0) return g;
        return parseFloat(b.rs) - parseFloat(a.rs);
    });

    render(results, benchmark);

    log("Scan complete.");
}

</script>

</body>
</html>
