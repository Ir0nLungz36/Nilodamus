<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expansion + Relative Strength Portal</title>

<style>

body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial,sans-serif;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    max-width:1400px;
    margin:auto;
}

.panel{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-top:5px;
    margin-bottom:10px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    width:100%;
    font-weight:bold;
}

button:hover{
    background:#1d4ed8;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0f172a;
    color:white;
}

th,td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:center;
}

.s{
    color:#22c55e;
    font-weight:bold;
}

.a{
    color:#38bdf8;
    font-weight:bold;
}

.b{
    color:#facc15;
    font-weight:bold;
}

.c{
    color:#ef4444;
    font-weight:bold;
}

.log{
    font-size:12px;
    white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>
ADR Expansion + Relative Strength Dashboard
</h1>

<div class="panel">

<label>Massive API Key</label>

<input
type="password"
id="apiKey"
placeholder="Paste Massive API Key">

<label>Symbols</label>

<textarea
id="symbols"
rows="6">

NVDA,
OPEN,
SOFI,
PLTR,
BAC,
SMCI,
QQQ

</textarea>

<button onclick="runScan()">
RUN SCAN
</button>

</div>

<div class="panel">

<div id="results">

Waiting for scan...

</div>

</div>

<div class="panel">

<div id="log" class="log"></div>

</div>

</div>

<script>

function writeLog(text){

    document
    .getElementById("log")
    .innerHTML += text + "\\n";

}

async function getBars(symbol){

    const apiKey =
    document.getElementById("apiKey").value;

    const end =
    new Date()
    .toISOString()
    .split("T")[0];

    const startDate =
    new Date();

    startDate.setDate(
        startDate.getDate()-60
    );

    const start =
    startDate
    .toISOString()
    .split("T")[0];

    const url =
`https://api.massive.com/v2/aggs/ticker/${symbol}/range/1/day/${start}/${end}?adjusted=true&sort=asc&limit=120&apikey=${apiKey}`;

    const response =
    await fetch(url);

    if(!response.ok){

        throw new Error(
            "HTTP " + response.status
        );

    }

    const data =
    await response.json();

    return data.results || [];

}

function adr20(bars){

    const last =
    bars.slice(-20);

    let total = 0;

    last.forEach(x=>{

        total +=
        (x.h-x.l);

    });

    return total/last.length;

}

function avgVol20(bars){

    const last =
    bars.slice(-20);

    let total = 0;

    last.forEach(x=>{

        total += x.v;

    });

    return total/last.length;

}

function grade(
    expansion,
    rs,
    volume
){

    if(
        expansion>120 &&
        rs>2 &&
        volume>1.5
    ){
        return "S";
    }

    if(
        expansion>100 &&
        rs>1 &&
        volume>1.2
    ){
        return "A";
    }

    if(
        expansion>80 &&
        rs>0
    ){
        return "B";
    }

    return "C";

}

function render(rows){

    let html = `

<table>

<tr>
<th>Symbol</th>
<th>Price</th>
<th>Expansion%</th>
<th>RS vs SPY</th>
<th>Vol Factor</th>
<th>Grade</th>
</tr>

`;

    rows.forEach(r=>{

        html += `

<tr>

<td>${r.symbol}</td>

<td>$${r.price}</td>

<td>${r.expansion}%</td>

<td>${r.rs}%</td>

<td>${r.volume}x</td>

<td class="${r.grade.toLowerCase()}">
${r.grade}
</td>

</tr>

`;

    });

    html += "</table>";

    document
    .getElementById("results")
    .innerHTML = html;

}

async function runScan(){

    document
    .getElementById("log")
    .innerHTML = "";

    writeLog(
        "Loading SPY benchmark..."
    );

    const spyBars =
    await getBars("SPY");

    const spyLatest =
    spyBars[spyBars.length-1];

    const spyPrev =
    spyBars[spyBars.length-2];

    const spyReturn =

    (
        (
            spyLatest.c -
            spyPrev.c
        )

        /

        spyPrev.c

    ) * 100;

    const symbols =

    document
    .getElementById("symbols")
    .value

    .split(",")

    .map(
        x=>x.trim()
    )

    .filter(Boolean);

    let results = [];

    for(const symbol of symbols){

        try{

            writeLog(
                "Scanning " + symbol
            );

            const bars =
            await getBars(symbol);

            if(
                bars.length<21
            ){
                continue;
            }

            const latest =
            bars[bars.length-1];

            const prev =
            bars[bars.length-2];

            const adr =
            adr20(bars);

            const avgVol =
            avgVol20(bars);

            const expansion =

            (
                (
                    latest.h -
                    latest.l
                )

                /

                adr

            ) * 100;

            const stockReturn =

            (
                (
                    latest.c -
                    prev.c
                )

                /

                prev.c

            ) * 100;

            const rs =
            stockReturn -
            spyReturn;

            const volFactor =
            latest.v /
            avgVol;

            const rank =
            grade(
                expansion,
                rs,
                volFactor
            );

            results.push({

                symbol,

                price:
                latest.c.toFixed(2),

                expansion:
                expansion.toFixed(1),

                rs:
                rs.toFixed(2),

                volume:
                volFactor.toFixed(2),

                grade:
                rank

            });

        }

        catch(err){

            writeLog(

                symbol +

                " ERROR -> " +

                err.message

            );

        }

    }

    results.sort(

        (a,b)=>

        parseFloat(b.rs)

        -

        parseFloat(a.rs)

    );

    render(results);

    writeLog(
        "Scan complete."
    );

}

</script>

</body>
</html>
