<!DOCTYPE html>
<html>
<head>
  <title>Massive ADR Expansion + Relative Strength</title>
  <style>
    body { background:#07080b; color:white; font-family:Arial; padding:24px; }
    input, select, button { padding:10px; border-radius:8px; border:1px solid #333; margin:4px; }
    input, select { background:#11141b; color:white; width:230px; }
    button { background:#1f6feb; color:white; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:18px; }
    .card { background:#12141a; border:1px solid #2b3140; border-radius:14px; padding:18px; }
    .summary { background:#101820; border:1px solid #2e4057; border-radius:16px; padding:24px; font-size:18px; line-height:1.6; }
    .score { font-size:56px; font-weight:bold; }
    .good { color:#35d07f; }
    .warn { color:#f5c542; }
    .bad { color:#ff5c5c; }
    .muted { color:#9ca3af; }
    pre { white-space:pre-wrap; color:#ff8080; }
  </style>
</head>

<body>

<h1>Massive ADR Expansion + Relative Strength Dashboard</h1>

<div class="card">
  <h2>Inputs</h2>
  <input id="apiKeyInput" type="password" placeholder="Massive API Key">
  <input id="symbolInput" placeholder="Symbol e.g. NVDA">
  <select id="benchmarkInput">
    <option value="QQQ">QQQ - Growth</option>
    <option value="SPY">SPY - S&P 500</option>
    <option value="XLK">XLK - Technology</option>
    <option value="SOXX">SOXX - Semiconductors</option>
    <option value="IWM">IWM - Small Caps</option>
    <option value="XLE">XLE - Energy</option>
    <option value="XLF">XLF - Financials</option>
  </select>
  <button onclick="saveAndRun()">Run Expansion Scan</button>
  <button onclick="clearInputs()">Clear</button>
  <p id="status" class="muted">Waiting...</p>
</div>

<div class="grid">
  <div class="card"><h2>Expansion Score</h2><div id="expansionScore" class="score">--</div></div>
  <div class="card"><h2>Relative Strength</h2><div id="rsScore" class="score">--</div></div>
  <div class="card"><h2>Final Signal</h2><div id="finalSignal">Waiting...</div></div>
</div>

<h2>Institutional Read</h2>
<div id="summary" class="summary">Waiting...</div>

<h2>Metrics</h2>
<div id="metrics" class="grid"></div>

<div class="card">
  <h2>Error Log</h2>
  <pre id="errors">None</pre>
</div>

<script>
let API_KEY = localStorage.getItem("MASSIVE_API_KEY") || "";
let LAST_SYMBOL = localStorage.getItem("EXPANSION_SYMBOL") || "";
let LAST_BENCHMARK = localStorage.getItem("EXPANSION_BENCHMARK") || "QQQ";

document.getElementById("apiKeyInput").value = API_KEY;
document.getElementById("symbolInput").value = LAST_SYMBOL;
document.getElementById("benchmarkInput").value = LAST_BENCHMARK;

function setStatus(msg){ document.getElementById("status").innerText = msg; }
function setError(msg){ document.getElementById("errors").innerText = msg || "None"; }
function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

function saveAndRun() {
  API_KEY = document.getElementById("apiKeyInput").value.trim();
  const symbol = document.getElementById("symbolInput").value.trim().toUpperCase();
  const benchmark = document.getElementById("benchmarkInput").value;

  if (!API_KEY) return setStatus("Paste your Massive API key first.");
  if (!symbol) return setStatus("Enter a symbol first.");

  localStorage.setItem("MASSIVE_API_KEY", API_KEY);
  localStorage.setItem("EXPANSION_SYMBOL", symbol);
  localStorage.setItem("EXPANSION_BENCHMARK", benchmark);

  run(symbol, benchmark);
}

function clearInputs() {
  localStorage.removeItem("EXPANSION_SYMBOL");
  document.getElementById("symbolInput").value = "";
  setStatus("Symbol cleared.");
}

async function massive(url) {
  const joiner = url.includes("?") ? "&" : "?";
  const fullUrl = `${url}${joiner}apiKey=${encodeURIComponent(API_KEY)}`;

  const r = await fetch(fullUrl);
  const data = await r.json();

  if (!r.ok || data.status === "ERROR" || data.status === "NOT_AUTHORIZED") {
    throw new Error(JSON.stringify(data, null, 2));
  }

  return data;
}

function dateNDaysAgo(days) {
  const d = new Date(Date.now() - days * 86400000);
  return d.toISOString().slice(0,10);
}

function todayISO() {
  return new Date().toISOString().slice(0,10);
}

async function massiveDailyBars(symbol, daysBack=100) {
  const from = dateNDaysAgo(daysBack);
  const to = todayISO();

  const url =
    `https://api.massive.com/v2/aggs/ticker/${encodeURIComponent(symbol)}/range/1/day/${from}/${to}?adjusted=true&sort=asc&limit=120`;

  const data = await massive(url);

  if (!data.results || !data.results.length) {
    throw new Error(`${symbol} bars error: ${JSON.stringify(data, null, 2)}`);
  }

  return data.results.map(b => ({
    time: b.t,
    open: b.o,
    high: b.h,
    low: b.l,
    close: b.c,
    volume: b.v
  }));
}

function average(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a,b) => a + b, 0) / arr.length;
}

function adr20(bars) {
  const recent = bars.slice(-20);
  const ranges = recent.map(b => ((b.high - b.low) / b.close) * 100);
  return average(ranges);
}

function avgVolume20(bars) {
  return average(bars.slice(-20).map(b => b.volume || 0));
}

function changeOverBars(bars, lookback) {
  if (bars.length <= lookback) return 0;
  const current = bars[bars.length - 1].close;
  const past = bars[bars.length - 1 - lookback].close;
  return ((current - past) / past) * 100;
}

function scoreADR(adr) {
  if (adr >= 5) return 100;
  if (adr >= 4) return 85;
  if (adr >= 3) return 70;
  if (adr >= 2) return 50;
  return 25;
}

function scoreExpansionUsed(expansionUsed) {
  if (expansionUsed <= 35) return 100;
  if (expansionUsed <= 55) return 80;
  if (expansionUsed <= 75) return 60;
  if (expansionUsed <= 100) return 40;
  return 15;
}

function scoreDollarVol(dollarVol) {
  if (dollarVol >= 5_000_000_000) return 100;
  if (dollarVol >= 1_000_000_000) return 85;
  if (dollarVol >= 500_000_000) return 70;
  if (dollarVol >= 100_000_000) return 50;
  return 20;
}

function scoreRVOL(rvol) {
  if (rvol >= 3) return 100;
  if (rvol >= 2) return 85;
  if (rvol >= 1.5) return 70;
  if (rvol >= 1) return 50;
  return 25;
}

function scoreRS(stockChange, benchmarkChange) {
  const spread = stockChange - benchmarkChange;
  if (spread >= 5) return 100;
  if (spread >= 3) return 85;
  if (spread >= 1.5) return 70;
  if (spread >= 0) return 55;
  if (spread >= -1.5) return 35;
  return 15;
}

function classForScore(score) {
  if (score >= 75) return "good";
  if (score >= 50) return "warn";
  return "bad";
}

function finalSignal(expansionScore, rsScore, expansionUsed) {
  if (expansionScore >= 80 && rsScore >= 70 && expansionUsed <= 85) return "A+ EXPANSION CANDIDATE";
  if (expansionScore >= 65 && rsScore >= 55) return "WATCHLIST / WAIT FOR SETUP";
  if (expansionUsed > 110) return "MOVE ALREADY EXTENDED";
  return "LOW PRIORITY";
}

function formatLarge(num) {
  if (num >= 1_000_000_000) return `$${(num / 1_000_000_000).toFixed(2)}B`;
  if (num >= 1_000_000) return `$${(num / 1_000_000).toFixed(2)}M`;
  return `$${num.toFixed(0)}`;
}

async function run(symbol, benchmark) {
  try {
    setError("");
    setStatus(`Loading ${symbol} Massive daily bars...`);

    const bars = await massiveDailyBars(symbol);
    await sleep(700);

    setStatus(`Loading ${benchmark} benchmark bars...`);
    const benchBars = await massiveDailyBars(benchmark);

    const last = bars[bars.length - 1];
    const prev = bars[bars.length - 2];

    const adr = adr20(bars);
    const todayRange = ((last.high - last.low) / last.close) * 100;
    const expansionUsed = adr ? (todayRange / adr) * 100 : 0;

    const avgVol = avgVolume20(bars);
    const latestVol = last.volume || 0;
    const rvol = avgVol ? latestVol / avgVol : 0;
    const dollarVol = last.close * latestVol;

    const dayChange = prev ? ((last.close - prev.close) / prev.close) * 100 : 0;

    const stock5d = changeOverBars(bars, 5);
    const stock20d = changeOverBars(bars, 20);
    const bench5d = changeOverBars(benchBars, 5);
    const bench20d = changeOverBars(benchBars, 20);

    const rs5Spread = stock5d - bench5d;
    const rs20Spread = stock20d - bench20d;

    const adrScore = scoreADR(adr);
    const expansionRoomScore = scoreExpansionUsed(expansionUsed);
    const dollarVolScore = scoreDollarVol(dollarVol);
    const rvolScore = scoreRVOL(rvol);
    const rs5Score = scoreRS(stock5d, bench5d);
    const rs20Score = scoreRS(stock20d, bench20d);

    const expansionScore = Math.round(
      adrScore * 0.35 +
      expansionRoomScore * 0.30 +
      dollarVolScore * 0.20 +
      rvolScore * 0.15
    );

    const rsScore = Math.round(
      rs5Score * 0.60 +
      rs20Score * 0.40
    );

    const signal = finalSignal(expansionScore, rsScore, expansionUsed);

    document.getElementById("expansionScore").innerHTML =
      `<span class="${classForScore(expansionScore)}">${expansionScore}</span>`;

    document.getElementById("rsScore").innerHTML =
      `<span class="${classForScore(rsScore)}">${rsScore}</span>`;

    document.getElementById("finalSignal").innerHTML =
      `<h2 class="${classForScore(Math.max(expansionScore, rsScore))}">${signal}</h2>
       <p class="muted">${symbol} vs ${benchmark}</p>`;

    document.getElementById("summary").innerHTML = `
      <h2>${symbol} Expansion Read</h2>
      <p><strong>Final Signal:</strong> ${signal}</p>
      <p><strong>ADR20:</strong> ${adr.toFixed(2)}%</p>
      <p><strong>Today Range:</strong> ${todayRange.toFixed(2)}%</p>
      <p><strong>Expansion Used:</strong> ${expansionUsed.toFixed(0)}%</p>
      <p><strong>Relative Strength:</strong> ${symbol} is ${rs5Spread >= 0 ? "outperforming" : "underperforming"} ${benchmark} by ${rs5Spread.toFixed(2)}% over 5 sessions.</p>
      <p><strong>Institutional Interpretation:</strong>
        ${
          expansionScore >= 80 && rsScore >= 70
          ? "High-quality expansion candidate. If Regime is aligned, this deserves setup/contract review."
          : expansionUsed > 110
          ? "The move may already be extended. Avoid chasing unless there is clean consolidation or fresh catalyst."
          : "Not yet an A+ expansion candidate. Monitor for compression, stronger volume, or relative strength improvement."
        }
      </p>
    `;

    document.getElementById("metrics").innerHTML = `
      <div class="card">
        <h2>Price / Range</h2>
        <p>Last Close: $${last.close.toFixed(2)}</p>
        <p>Open: $${last.open.toFixed(2)}</p>
        <p>High / Low: $${last.high.toFixed(2)} / $${last.low.toFixed(2)}</p>
        <p>Day Change: <span class="${dayChange >= 0 ? "good" : "bad"}">${dayChange.toFixed(2)}%</span></p>
      </div>

      <div class="card">
        <h2>ADR Expansion</h2>
        <p>ADR20: ${adr.toFixed(2)}%</p>
        <p>Today Range: ${todayRange.toFixed(2)}%</p>
        <p>Expansion Used: ${expansionUsed.toFixed(0)}%</p>
        <p>Expansion Room Score: ${expansionRoomScore}/100</p>
      </div>

      <div class="card">
        <h2>Liquidity / RVOL</h2>
        <p>Volume: ${latestVol.toLocaleString()}</p>
        <p>Avg Vol 20D: ${Math.round(avgVol).toLocaleString()}</p>
        <p>RVOL: ${rvol.toFixed(2)}x</p>
        <p>Dollar Vol: ${formatLarge(dollarVol)}</p>
      </div>

      <div class="card">
        <h2>Relative Strength</h2>
        <p>${symbol} 5D: ${stock5d.toFixed(2)}%</p>
        <p>${benchmark} 5D: ${bench5d.toFixed(2)}%</p>
        <p>5D Spread: ${rs5Spread.toFixed(2)}%</p>
        <p>20D Spread: ${rs20Spread.toFixed(2)}%</p>
      </div>

      <div class="card">
        <h2>Score Breakdown</h2>
        <p>ADR Score: ${adrScore}/100</p>
        <p>Expansion Room: ${expansionRoomScore}/100</p>
        <p>Dollar Vol: ${dollarVolScore}/100</p>
        <p>RVOL: ${rvolScore}/100</p>
      </div>

      <div class="card">
        <h2>Next Step</h2>
        <p>
          ${
            signal.includes("A+")
            ? "Run Firecracker Options next."
            : signal.includes("WATCHLIST")
            ? "Wait for pullback/retest or intraday coil."
            : "Do not force this ticker yet."
          }
        </p>
      </div>
    `;

    setStatus(`${symbol} Massive expansion scan loaded.`);
  } catch (err) {
    setStatus("Failed to load. Check Error Log.");
    setError(err.message);
  }
}

if (API_KEY && LAST_SYMBOL) {
  run(LAST_SYMBOL, LAST_BENCHMARK);
}
</script>

</body>
</html>
